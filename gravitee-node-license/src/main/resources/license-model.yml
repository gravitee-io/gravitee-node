tiers:
    planet:
        packs: &planet-packs
            - enterprise-features
            - enterprise-legacy-upgrade
            - enterprise-identity-provider
    galaxy:
        packs: &galaxy-packs
            - *planet-packs
            - observability
            - enterprise-policy
            - enterprise-alert-engine
    universe:
        packs:
            - *galaxy-packs
            - event-native
            - enterprise-mfa-factor
            - enterprise-secret-manager
            - enterprise-authenticator

    ############################### Gamma tiers ################################
    gamma-planet:
        packs:
            - standard
    gamma-galaxy:
        packs:
            - enterprise
    gamma-universe:
        packs:
            - enterprise
    ############################################################################
